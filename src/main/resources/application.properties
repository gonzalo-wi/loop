spring.application.name=loop
spring.config.import=optional:file:./.env[.properties]

# ========================================
# PostgreSQL Configuration (Primary DB)
# ========================================
spring.datasource.postgres.jdbc-url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.postgres.username=${DB_USER}
spring.datasource.postgres.password=${DB_PASSWORD}
spring.datasource.postgres.driver-class-name=org.postgresql.Driver

# ========================================
# SQL Server Configuration (Secondary DB)
# ========================================
spring.datasource.sqlserver.jdbc-url=jdbc:sqlserver://${SQLSERVER_HOST}:${SQLSERVER_PORT};databaseName=${SQLSERVER_DB};encrypt=true;trustServerCertificate=true
spring.datasource.sqlserver.username=${SQLSERVER_USER}
spring.datasource.sqlserver.password=${SQLSERVER_PASSWORD}
spring.datasource.sqlserver.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ========================================
# JPA/Hibernate General
# ========================================
# Las configuraciones específicas de cada DB están en sus respectivas @Configuration
spring.jpa.show-sql=true

# Feign Client Configuration
delivery.service.url=http://jmobile.somoselagua.com.ar:8080

# Logging para Feign (opcional, para debug)
logging.level.com.eljumillano.loop.client=DEBUG
